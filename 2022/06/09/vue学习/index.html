5;</span><br><span class="line"></span><br><span class="line">            // fn:function()&#123;</span><br><span class="line">            // </span><br><span class="line">            //     return &#x27;fn&#x27;</span><br><span class="line">            // &#125;</span><br><span class="line"></span><br><span class="line">            // fn:()=&gt;&#123;</span><br><span class="line">            // this指向window</span><br><span class="line">            //     return &#x27;fn&#x27;</span><br><span class="line">            // &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;)</span><br><span class="line">&lt;/script&gt;</span><br></pre></td></tr></table></figure>

>61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br></pre></td><td class="code"><pre><span class="line">vue指令</span><br><span class="line"></span><br><span class="line">v-text</span><br><span class="line">/*</span><br><span class="line">*解决网络加载慢时花括号闪现</span><br><span class="line">*会转译为文本，标签语法不生效</span><br><span class="line">**/</span><br><span class="line">&lt;h3 v-text=&#x27;msg&#x27;&gt;&lt;/h3&gt;</span><br><span class="line">&lt;h3 v-text=&#x27;&lt;a&gt;转译&lt;/a&gt;&#x27;&gt;&lt;/h3&gt;</span><br><span class="line"></span><br><span class="line">v-html</span><br><span class="line">/*</span><br><span class="line">*显示html内容，非必要时，建议不使用，有安全隐患</span><br><span class="line">**/</span><br><span class="line">&lt;h3 v-html=&#x27;html&#x27;&gt;&lt;/h3&gt;</span><br><span class="line">data:&#123;</span><br><span class="line">    html:&#x27;&lt;a href=&quot;http://xxx.xxx.xxx&quot;&gt;xxxx&lt;/a&gt;&#x27;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">v-cloak</span><br><span class="line">/*</span><br><span class="line">*</span><br><span class="line">*解决闪动问题 现在一般也不用了</span><br><span class="line">*用css样式的方法</span><br><span class="line">**/</span><br><span class="line">#css中</span><br><span class="line">&lt;style&gt;</span><br><span class="line">[v-cloak]:&#123;</span><br><span class="line">    display:none</span><br><span class="line">&#125;</span><br><span class="line">&lt;style/&gt;</span><br><span class="line">#html</span><br><span class="line">&lt;div&gt;</span><br><span class="line">&lt;h3 v-cloak&gt;&#123;&#123;msg&#125;&#125;&lt;/h3&gt;</span><br><span class="line">&lt;/div&gt;</span><br><span class="line"></span><br><span class="line">v-pre</span><br><span class="line">/*</span><br><span class="line">* 原样输出 优化 不需要vue转成虚拟dome的</span><br><span class="line">**/</span><br><span class="line">&lt;div v-pre&gt;&lt;/div&gt;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">v-once</span><br><span class="line">/*</span><br><span class="line">*动态改变msg值，次绑定将不会发生改变</span><br><span class="line">**/</span><br><span class="line">&lt;div v-once&gt;&#123;&#123;msg&#125;&#125;&lt;/div&gt;</span><br><span class="line"></span><br><span class="line">v-if v-show</span><br><span class="line">/*</span><br><span class="line">*v-if  如果为false则不显示，删除其当前元素，true显示  </span><br><span class="line">* 初始效率高，切换效率低</span><br><span class="line">*v-show 如果为false则不显示，以样式方式不让其显示，true显示</span><br><span class="line">*初始效率低，则切换效率高</span><br><span class="line">**/</span><br><span class="line">&lt;div v-if=&quot;show&quot;&gt;&lt;/div&gt;</span><br><span class="line">data:&#123;</span><br><span class="line">    show:true</span><br><span class="line">&#125;</span><br><span class="line">//tabe 切换</span><br><span class="line">&lt;div v-if=&quot;cnt[0]&quot;&gt;1111&lt;/div&gt;</span><br><span class="line">&lt;div v-if=&quot;cnt[1]&quot;&gt;2222&lt;/div&gt;</span><br><span class="line">&lt;div v-show=&quot;cnt[0]&quot;&gt;1111&lt;/div&gt;</span><br><span class="line">&lt;div v-show=&quot;cnt[1]&quot;&gt;2222&lt;/div&gt;</span><br><span class="line">data:&#123;</span><br><span class="line">    cnt:[true,false]</span><br><span class="line">&#125;</span><br><span class="line">//多条件</span><br><span class="line">&lt;div v-if=&quot;age&lt;=10&quot;&gt;儿童&lt;/div&gt;</span><br><span class="line">&lt;div v-else-if=&quot;age&lt;=20&quot;&gt;少年&lt;/div&gt;</span><br><span class="line">&lt;div v-else&gt;老年&lt;/div&gt;</span><br><span class="line">data:&#123;</span><br><span class="line">    age:26</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">v-bind</span><br><span class="line">/*</span><br><span class="line">*动态绑定属性值</span><br><span class="line">*简写 ：</span><br><span class="line">**/</span><br><span class="line">&lt;img v-bind;src=&quot;src&quot; /&gt;</span><br><span class="line">&lt;img :src=&quot;src&quot;&gt;</span><br><span class="line">data:&#123;</span><br><span class="line">    src:&#x27;http://xxxx.xxxx&#x27;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">v-for</span><br><span class="line">/*</span><br><span class="line">*循环 v-if=“(临时变量，key) in/of 数据变量”</span><br><span class="line">*循环中设置key，提升渲染性能，不要以索引来定义</span><br><span class="line">**/</span><br><span class="line">&lt;li v-for=&quot;(item) in users&quot; :key=&quot;item.id&quot;&gt;</span><br><span class="line">&lt;span&gt;&#123;&#123;item.id&#125;&#125;&lt;/span&gt;</span><br><span class="line">&lt;span&gt;&#123;&#123;item.name&#125;&#125;&lt;/span&gt;</span><br><span class="line">&lt;span&gt; -- 删除&lt;/span&gt;</span><br><span class="line">&lt;/li&gt;</span><br><span class="line">data:&#123;</span><br><span class="line">    users:[</span><br><span class="line">        &#123;id:1,name:&quot;zc&quot;&#125;,</span><br><span class="line">        &#123;id:2,name:&quot;zc&quot;&#125;</span><br><span class="line">    ]</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">v-on</span><br><span class="line">/*</span><br><span class="line">* </span><br><span class="line">*</span><br><span class="line">**/</span><br><span class="line"></span><br></pre></td></tr></table></figure>
